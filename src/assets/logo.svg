<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Rect Background (Optional, but good for contrast) -->
  <rect width="100" height="100" rx="20" fill="#4F46E5" fill-opacity="0.05" />
  
  <!-- The VP Ligature -->
  <path 
    d="M 25 35 L 45 70 L 65 35 V 75" 
    stroke="#4F46E5" 
    stroke-width="10" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- The P loop, slightly detached and stylized like a sound wave -->
  <path 
    d="M 65 35 C 88 35 88 62 65 62" 
    stroke="#4F46E5" 
    stroke-width="10" 
    stroke-linecap="round"
  />
</svg>
